<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #ffffff; }
      .step-text { font-family: Arial, sans-serif; font-size: 13px; fill: #a8dadc; }
      .step-num { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .circle { fill: #112240; stroke: #00d4ff; stroke-width: 3; }
      .arrow-line { stroke: #00d4ff; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="#0a1220"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="title">🚀 Quick Start Journey</text>
  
  <!-- Step 1: Clone -->
  <circle cx="100" cy="150" r="40" class="circle"/>
  <text x="100" y="155" text-anchor="middle" class="step-num">1</text>
  <text x="100" y="210" text-anchor="middle" class="step-text">Clone Repo</text>
  <text x="100" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#0099ff">git clone</text>
  
  <!-- Arrow 1 -->
  <path d="M 140 150 L 190 150" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Install -->
  <circle cx="250" cy="150" r="40" class="circle"/>
  <text x="250" y="155" text-anchor="middle" class="step-num">2</text>
  <text x="250" y="210" text-anchor="middle" class="step-text">Install Deps</text>
  <text x="250" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#0099ff">pip install</text>
  
  <!-- Arrow 2 -->
  <path d="M 290 150 L 340 150" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Run -->
  <circle cx="400" cy="150" r="40" class="circle"/>
  <text x="400" y="155" text-anchor="middle" class="step-num">3</text>
  <text x="400" y="210" text-anchor="middle" class="step-text">Run Dashboard</text>
  <text x="400" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#0099ff">streamlit run</text>
  
  <!-- Arrow 3 -->
  <path d="M 440 150 L 490 150" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Explore -->
  <circle cx="550" cy="150" r="40" class="circle"/>
  <text x="550" y="155" text-anchor="middle" class="step-num">4</text>
  <text x="550" y="210" text-anchor="middle" class="step-text">Make Predictions</text>
  <text x="550" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#0099ff">localhost:8501</text>
  
  <!-- Arrow 4 -->
  <path d="M 590 150 L 640 150" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Share -->
  <circle cx="700" cy="150" r="40" class="circle"/>
  <text x="700" y="155" text-anchor="middle" class="step-num">5</text>
  <text x="700" y="210" text-anchor="middle" class="step-text">Deploy & Share</text>
  <text x="700" y="228" text-anchor="middle" font-family="Arial" font-size="11" fill="#0099ff">Docker/Cloud</text>
  
  <!-- Bottom section: Commands -->
  <rect x="50" y="280" width="900" height="100" fill="#112240" stroke="#00d4ff" stroke-width="1" rx="5"/>
  
  <text x="450" y="305" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#00d4ff">💻 Commands</text>
  
  <g font-family="Courier New" font-size="12" fill="#a8dadc">
    <text x="70" y="335">$ git clone https://github.com/adewalelateef/predictive-maintenance-smart-factory.git</text>
    <text x="70" y="360">$ pip install -r requirements.txt</text>
    <text x="70" y="385">$ streamlit run dashboard/app.py</text>
  </g>
  
  <!-- Success indicator -->
  <circle cx="920" cy="330" r="15" fill="none" stroke="#00ff00" stroke-width="2"/>
  <text x="920" y="337" text-anchor="middle" font-family="Arial" font-size="20" fill="#00ff00">✓</text>
</svg>
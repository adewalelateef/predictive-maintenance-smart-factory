<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <style>
      .box { fill: #0a192f; stroke: #00d4ff; stroke-width: 2; }
      .box-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #00d4ff; }
      .box-text { font-family: Arial, sans-serif; font-size: 13px; fill: #a8dadc; }
      .arrow { stroke: #00d4ff; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .section-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; }
      .layer-box { fill: #112240; stroke: #0099ff; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#0a1220"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="section-title" font-size="24">
    🏗️ System Architecture
  </text>
  
  <!-- Layer 1: Data Input -->
  <text x="50" y="75" class="section-title" font-size="14">📊 DATA LAYER</text>
  
  <rect x="50" y="95" width="120" height="80" rx="5" class="layer-box"/>
  <text x="110" y="120" text-anchor="middle" class="box-title">AI4I Dataset</text>
  <text x="110" y="140" text-anchor="middle" class="box-text">10,000 samples</text>
  <text x="110" y="157" text-anchor="middle" class="box-text">5 features</text>
  
  <rect x="210" y="95" width="120" height="80" rx="5" class="layer-box"/>
  <text x="270" y="120" text-anchor="middle" class="box-title">Data Pipeline</text>
  <text x="270" y="140" text-anchor="middle" class="box-text">Normalization</text>
  <text x="270" y="157" text-anchor="middle" class="box-text">Feature Eng.</text>
  
  <!-- Arrow down -->
  <path d="M 270 175 L 270 220" class="arrow"/>
  
  <!-- Layer 2: Model Training -->
  <text x="50" y="235" class="section-title" font-size="14">🤖 ML LAYER</text>
  
  <rect x="50" y="255" width="120" height="90" rx="5" class="layer-box"/>
  <text x="110" y="285" text-anchor="middle" class="box-title">XGBoost</text>
  <text x="110" y="305" text-anchor="middle" class="box-text">Optuna Tuning</text>
  <text x="110" y="322" text-anchor="middle" class="box-text">88.5% Recall</text>
  
  <rect x="210" y="255" width="120" height="90" rx="5" class="layer-box"/>
  <text x="270" y="285" text-anchor="middle" class="box-title">SHAP Engine</text>
  <text x="270" y="305" text-anchor="middle" class="box-text">Explainability</text>
  <text x="270" y="322" text-anchor="middle" class="box-text">Interpretability</text>
  
  <rect x="370" y="255" width="120" height="90" rx="5" class="layer-box"/>
  <text x="430" y="285" text-anchor="middle" class="box-title">Validation</text>
  <text x="430" y="305" text-anchor="middle" class="box-text">Cross-validation</text>
  <text x="430" y="322" text-anchor="middle" class="box-text">Metrics</text>
  
  <!-- Arrow down -->
  <path d="M 270 345 L 270 390" class="arrow"/>
  
  <!-- Layer 3: Deployment -->
  <text x="50" y="405" class="section-title" font-size="14">🚀 DEPLOYMENT LAYER</text>
  
  <rect x="50" y="425" width="110" height="80" rx="5" class="layer-box"/>
  <text x="105" y="450" text-anchor="middle" class="box-title">Streamlit</text>
  <text x="105" y="470" text-anchor="middle" class="box-text">Web Dashboard</text>
  <text x="105" y="487" text-anchor="middle" class="box-text">8501</text>
  
  <rect x="190" y="425" width="110" height="80" rx="5" class="layer-box"/>
  <text x="245" y="450" text-anchor="middle" class="box-title">Docker</text>
  <text x="245" y="470" text-anchor="middle" class="box-text">Container</text>
  <text x="245" y="487" text-anchor="middle" class="box-text">Portable</text>
  
  <rect x="330" y="425" width="110" height="80" rx="5" class="layer-box"/>
  <text x="385" y="450" text-anchor="middle" class="box-title">Cloud</text>
  <text x="385" y="470" text-anchor="middle" class="box-text">AWS/Azure/GCP</text>
  <text x="385" y="487" text-anchor="middle" class="box-text">Scalable</text>
  
  <!-- Right side: Features -->
  <text x="550" y="75" class="section-title" font-size="14">⚙️ FEATURES</text>
  
  <rect x="550" y="95" width="180" height="70" rx="5" class="layer-box"/>
  <text x="640" y="115" text-anchor="middle" class="box-title">🔮 Predictions</text>
  <text x="640" y="135" text-anchor="middle" class="box-text">Real-time failure probability</text>
  <text x="640" y="150" text-anchor="middle" class="box-text">with confidence scores</text>
  
  <rect x="550" y="185" width="180" height="70" rx="5" class="layer-box"/>
  <text x="640" y="205" text-anchor="middle" class="box-title">🎚️ What-If Simulator</text>
  <text x="640" y="225" text-anchor="middle" class="box-text">Explore hypothetical</text>
  <text x="640" y="240" text-anchor="middle" class="box-text">operational scenarios</text>
  
  <rect x="550" y="275" width="180" height="70" rx="5" class="layer-box"/>
  <text x="640" y="295" text-anchor="middle" class="box-title">📊 SHAP Explainability</text>
  <text x="640" y="315" text-anchor="middle" class="box-text">Understand model</text>
  <text x="640" y="330" text-anchor="middle" class="box-text">predictions</text>
  
  <rect x="550" y="365" width="180" height="70" rx="5" class="layer-box"/>
  <text x="640" y="385" text-anchor="middle" class="box-title">💼 Business Impact</text>
  <text x="640" y="405" text-anchor="middle" class="box-text">ROI & cost analysis</text>
  <text x="640" y="420" text-anchor="middle" class="box-text">(€12K savings/failure)</text>
  
  <!-- Performance metrics section -->
  <text x="50" y="550" class="section-title" font-size="14">📈 PERFORMANCE</text>
  
  <g font-family="Arial" font-size="12" fill="#a8dadc">
    <text x="50" y="570">Accuracy: 97.2% | Precision: 94.1% | Recall: 88.5% | F1: 91.1% | AUC: 0.965</text>
  </g>
</svg>